<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>cgraph — Code Graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
  <script src="/3d-force-graph.min.js"></script>
  <script src="/config.js"></script>
  <style>
    :root {
      --bg:        #0C0E14;
      --surface:   #181C27;
      --surface-2: #1F2436;
      --border:    #2E3650;
      --border-2:  #394264;
      --text:      #EEF1FA;
      --text-2:    #9AA3BC;
      --text-3:    #6B778F;
      --accent:    #4F8EF7;
      --accent-h:  #3B7AEF;
      --green:     #34D399;
      --purple:    #A78BFA;
      --orange:    #FB923C;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ── HEADER ───────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 0 20px;
      height: 52px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    #logo {
      font-family: 'Fira Code', monospace;
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }
    #logo em { color: var(--accent); font-style: normal; }

    .hsep { width: 1px; height: 22px; background: var(--border-2); flex-shrink: 0; }

    #pProject {
      font-family: 'Fira Code', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--accent);
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .stat { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
    .stat-label {
      font-size: 9px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: 'Fira Code', monospace;
    }
    .stat-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      font-family: 'Fira Code', monospace;
      line-height: 1;
    }

    #layoutStatus {
      margin-left: auto;
      font-size: 11px;
      color: var(--accent);
      font-family: 'Fira Code', monospace;
      flex-shrink: 0;
    }

    /* ── TOOLBAR ──────────────────────────────────── */
    #toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .search-wrap { position: relative; flex-shrink: 0; }
    .search-icon {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-3);
      font-size: 14px;
      pointer-events: none;
      user-select: none;
    }
    input[type=text] {
      background: var(--bg);
      border: 1px solid var(--border-2);
      color: var(--text);
      padding: 7px 10px 7px 32px;
      border-radius: 7px;
      font-size: 13px;
      width: 230px;
      outline: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: border-color 0.15s;
    }
    input[type=text]:focus { border-color: var(--accent); }
    input[type=text]::placeholder { color: var(--text-3); }

    select {
      background: var(--bg);
      border: 1px solid var(--border-2);
      color: var(--text-2);
      padding: 7px 10px;
      border-radius: 7px;
      font-size: 13px;
      outline: none;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: border-color 0.15s;
    }
    select:focus { border-color: var(--accent); }

    .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 7px 18px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }
    .btn:hover { background: var(--accent-h); }
    .btn:active { transform: scale(0.97); }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border-2);
      color: var(--text-2);
      padding: 6px 13px;
      border-radius: 7px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: 'Fira Code', monospace;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      flex-shrink: 0;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,247,0.07); }

    .tsep { width: 1px; height: 26px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

    /* ── MAIN ─────────────────────────────────────── */
    #main { flex: 1; overflow: hidden; position: relative; }
    #graph-container { position: absolute; inset: 0; }

    /* ── RIGHT PANEL ──────────────────────────────── */
    #panel {
      position: absolute;
      top: 12px;
      right: 12px;
      bottom: 12px;
      width: 300px;
      background: rgba(10, 14, 28, 0.92);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border-2);
      border-radius: 12px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      z-index: 50;
    }

    #panel-header {
      padding: 14px 16px 13px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #panel-header::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }
    #panel-header-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      font-family: 'Fira Code', monospace;
    }

    #panel-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    #panel-body::-webkit-scrollbar,
    #panel-hotspots::-webkit-scrollbar { width: 4px; }
    #panel-body::-webkit-scrollbar-track,
    #panel-hotspots::-webkit-scrollbar-track { background: transparent; }
    #panel-body::-webkit-scrollbar-thumb,
    #panel-hotspots::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }

    .prow { margin-bottom: 14px; }
    .prow-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 5px;
      font-family: 'Fira Code', monospace;
    }
    .prow-val {
      font-size: 13px;
      color: var(--text);
      word-break: break-all;
      font-family: 'Fira Code', monospace;
      line-height: 1.5;
    }

    .pdivider { height: 1px; background: var(--border); margin: 4px 0 16px; }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      font-family: 'Fira Code', monospace;
    }
    .badge::before { content: '●'; font-size: 7px; }
    .badge-file           { background: rgba(96,165,250,0.12); color: #60A5FA; border: 1px solid rgba(96,165,250,0.22); }
    .badge-file::before   { color: #60A5FA; }
    .badge-function       { background: rgba(52,211,153,0.12); color: #34D399; border: 1px solid rgba(52,211,153,0.22); }
    .badge-function::before { color: #34D399; }
    .badge-arrow_function { background: rgba(52,211,153,0.12); color: #34D399; border: 1px solid rgba(52,211,153,0.22); }
    .badge-arrow_function::before { color: #34D399; }
    .badge-class          { background: rgba(167,139,250,0.12); color: #A78BFA; border: 1px solid rgba(167,139,250,0.22); }
    .badge-class::before  { color: #A78BFA; }
    .badge-method         { background: rgba(251,146,60,0.12); color: #FB923C; border: 1px solid rgba(251,146,60,0.22); }
    .badge-method::before { color: #FB923C; }

    .edge-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      font-family: 'Fira Code', monospace;
    }
    .edge-list { display: flex; flex-direction: column; gap: 3px; margin-bottom: 14px; }
    .edge-item {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 7px 9px;
      border-radius: 6px;
      background: var(--surface-2);
      transition: background 0.12s;
      cursor: default;
    }
    .edge-item:hover { background: var(--border); }
    .edge-name {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 1;
      min-width: 0;
      overflow: hidden;
    }
    .edge-name-sym {
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edge-name-path {
      font-family: 'Fira Code', monospace;
      font-size: 9px;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .edge-tag {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 6px;
      border-radius: 4px;
      flex-shrink: 0;
      font-family: 'Fira Code', monospace;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }
    .edge-tag-imports    { background: rgba(96,165,250,0.15); color: #60A5FA; }
    .edge-tag-calls      { background: rgba(52,211,153,0.15); color: #34D399; }
    .edge-tag-extends    { background: rgba(167,139,250,0.15); color: #A78BFA; }
    .edge-tag-implements { background: rgba(251,146,60,0.15); color: #FB923C; }
    .edge-tag-contains   { background: rgba(78,86,114,0.2);   color: var(--text-3); }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 40px 20px;
      text-align: center;
    }
    .empty-icon {
      font-size: 32px;
      color: var(--accent);
      opacity: 0.5;
    }
    .empty-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .empty-text {
      font-size: 12px;
      color: var(--text-2);
      line-height: 1.7;
      font-family: 'Fira Code', monospace;
    }

    /* ── LEGEND (floating bottom-left) ───────────────── */
    #legend {
      position: absolute;
      bottom: 12px;
      left: 12px;
      z-index: 50;
      padding: 10px 14px;
      background: rgba(10, 14, 28, 0.88);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border-2);
      border-radius: 10px;
      display: flex;
      gap: 14px;
      font-size: 12px;
      color: var(--text);
      align-items: center;
      font-family: 'Fira Code', monospace;
      flex-wrap: wrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .leg-group { display: flex; align-items: center; gap: 10px; }
    .leg-cat {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .leg { display: flex; align-items: center; gap: 5px; color: var(--text); }
    .leg-dot  { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
    .leg-line { width: 16px; height: 2px; flex-shrink: 0; border-radius: 1px; }

    /* ── PANEL TABS ──────────────────────────────── */
    .panel-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .panel-tab {
      flex: 1;
      padding: 10px 0;
      font-size: 10px;
      font-weight: 700;
      font-family: 'Fira Code', monospace;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-3);
      cursor: pointer;
      text-align: center;
      border: none;
      background: transparent;
      transition: color 0.15s, border-bottom 0.15s;
      border-bottom: 2px solid transparent;
    }
    .panel-tab:hover { color: var(--text-2); }
    .panel-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── HOTSPOTS ─────────────────────────────────── */
    .hotspot-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
      margin-top: 4px;
      font-family: 'Fira Code', monospace;
    }
    .hotspot-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 6px;
      background: var(--surface-2);
      margin-bottom: 3px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .hotspot-item:hover { background: var(--border); }
    .hotspot-rank {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-3);
      font-family: 'Fira Code', monospace;
      width: 16px;
      text-align: right;
      flex-shrink: 0;
    }
    .hotspot-info { flex: 1; min-width: 0; overflow: hidden; }
    .hotspot-name {
      font-size: 11px;
      font-family: 'Fira Code', monospace;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hotspot-path {
      font-size: 9px;
      font-family: 'Fira Code', monospace;
      color: var(--text-3);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hotspot-count {
      font-size: 11px;
      font-weight: 700;
      font-family: 'Fira Code', monospace;
      color: var(--accent);
      flex-shrink: 0;
    }
    .hotspot-divider { height: 1px; background: var(--border); margin: 12px 0; }

    /* ── FOCUS BADGE ──────────────────────────────── */
    #focus-badge {
      position: absolute;
      top: 12px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 60;
      display: none;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: rgba(251,191,36,0.12);
      border: 1px solid rgba(251,191,36,0.35);
      border-radius: 20px;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: #FBBF24;
      white-space: nowrap;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    #focus-badge.visible { display: flex; }
    #focus-badge-esc {
      cursor: pointer;
      font-size: 10px;
      color: rgba(251,191,36,0.6);
      border: 1px solid rgba(251,191,36,0.25);
      padding: 2px 7px;
      border-radius: 4px;
      transition: color 0.15s;
    }
    #focus-badge-esc:hover { color: #FBBF24; }

    /* ── OVERLAY ──────────────────────────────────── */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(12,14,20,0.82);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      transition: opacity 0.4s;
      pointer-events: none;
    }
    #overlay.hidden { opacity: 0; }

    .spinner {
      width: 30px;
      height: 30px;
      border: 2px solid var(--border-2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #overlayMsg {
      font-size: 13px;
      color: var(--text-2);
      font-family: 'Fira Code', monospace;
    }
  </style>
</head>
<body>

<div id="header">
  <div id="logo">c<em>·</em>graph</div>
  <div class="hsep"></div>
  <div id="pProject">—</div>
  <div class="hsep"></div>
  <div class="stat">
    <span class="stat-label">files</span>
    <span class="stat-val" id="pFiles">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">functions</span>
    <span class="stat-val" id="pFuncs">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">imports</span>
    <span class="stat-val" id="pImports">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">calls</span>
    <span class="stat-val" id="pCalls">—</span>
  </div>
  <span id="layoutStatus"></span>
</div>

<div id="toolbar">
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" id="search" placeholder="search symbols or files…" />
  </div>
  <select id="langFilter"><option value="all">All languages</option></select>
  <button class="btn" onclick="applyFilter()">Filter</button>
  <div class="tsep"></div>
  <button class="btn-ghost" onclick="resetCamera()">fit view</button>
  <button class="btn-ghost" onclick="rerunLayout()">reheat</button>
  <button class="btn-ghost" id="btnFocus" onclick="toggleFocusMode()" style="display:none;border-color:rgba(251,191,36,0.4);color:#FBBF24;">focus [F]</button>
</div>

<div id="main">
  <div id="overlay">
    <div class="spinner"></div>
    <p id="overlayMsg">Building graph…</p>
  </div>
  <div id="graph-container"></div>

  <div id="panel">
    <div id="panel-header">
      <span id="panel-header-title">Inspector</span>
    </div>
    <div class="panel-tabs">
      <button class="panel-tab active" onclick="switchTab('details')" id="tab-details">Details</button>
      <button class="panel-tab" onclick="switchTab('hotspots')" id="tab-hotspots">Hotspots</button>
    </div>
    <div id="panel-body"></div>
    <div id="panel-hotspots" style="display:none;flex:1;overflow-y:auto;padding:16px;">
    </div>
  </div>

  <div id="focus-badge">
    <span>🎯</span>
    <span id="focus-badge-name"></span>
    <span id="focus-badge-esc" onclick="exitFocusMode()">esc</span>
  </div>

  <div id="legend">
    <span class="leg-cat">nodes</span>
    <div class="leg-group">
      <span class="leg"><span class="leg-dot" style="background:#60A5FA"></span>file</span>
      <span class="leg"><span class="leg-dot" style="background:#FBBF24;box-shadow:0 0 6px #FBBF24"></span>entry</span>
      <span class="leg"><span class="leg-dot" style="background:#34D399"></span>function</span>
      <span class="leg"><span class="leg-dot" style="background:#A78BFA"></span>class</span>
      <span class="leg"><span class="leg-dot" style="background:#FB923C"></span>method</span>
    </div>
    <span class="leg-cat" style="margin-left:4px">edges</span>
    <div class="leg-group">
      <span class="leg"><span class="leg-line" style="background:#60A5FA"></span>imports</span>
      <span class="leg"><span class="leg-line" style="background:#34D399"></span>calls ✦</span>
      <span class="leg"><span class="leg-line" style="background:#A78BFA"></span>extends</span>
    </div>
  </div>
</div>

<script>
const API = window.CODENEXUS_API || 'http://localhost:8667';

const NODE_COLOR = {
  file: '#60A5FA', function: '#34D399', arrow_function: '#34D399',
  class: '#A78BFA', method: '#FB923C',
};
const ENTRY_COLOR = '#FBBF24';
const NODE_VAL = { file: 10, class: 7, function: 3, arrow_function: 3, method: 2 };
const LINK_COLOR = {
  imports: '#3B82F6', calls: '#10B981', extends: '#8B5CF6',
  implements: '#F97316', contains: '#1E2535',
};

let fullGraph = null;
let graph3d = null;
let filterState = { keyword: '', lang: 'all' };
let selectedNodeId = null;
let highlightNodes = new Set();
let highlightLinks = new Set();
let entryNodeIds = new Set();
let focusNodeId = null;
let currentTab = 'details';

// ── safe DOM helpers ──────────────────────────────────────────────────────────

function el(tag, cls, text) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (text !== undefined) e.textContent = text;
  return e;
}

function clearPanel() {
  if (currentTab !== 'details') return;
  const body = document.getElementById('panel-body');
  body.textContent = '';
  const wrap = el('div', 'empty-state');
  wrap.appendChild(el('div', 'empty-icon', '◎'));
  wrap.appendChild(el('div', 'empty-title', 'No node selected'));
  wrap.appendChild(el('div', 'empty-text', 'Click any node\nin the graph'));
  body.appendChild(wrap);
}

// ── entry points ──────────────────────────────────────────────────────────────

function computeEntryPoints() {
  const hasIncoming = new Set(
    fullGraph.edges
      .filter(e => e.type === 'imports' || e.type === 'calls')
      .map(e => e.target)
  );
  fullGraph.nodes.forEach(n => {
    if (n.type === 'file' && !hasIncoming.has(n.id)) entryNodeIds.add(n.id);
  });
}

function nodeBaseColor(n) {
  if (n.type === 'file' && entryNodeIds.has(n.id)) return ENTRY_COLOR;
  return NODE_COLOR[n.type] || '#718096';
}

// ── load ──────────────────────────────────────────────────────────────────────

async function loadGraph() {
  const res = await fetch(`${API}/api/graph`);
  fullGraph = await res.json();

  document.getElementById('pProject').textContent = fullGraph.projectName;
  document.getElementById('pFiles').textContent   = fullGraph.stats.totalFiles;
  document.getElementById('pFuncs').textContent   = fullGraph.stats.totalFunctions;
  document.getElementById('pImports').textContent = fullGraph.edges.filter(e => e.type === 'imports').length;
  document.getElementById('pCalls').textContent   = fullGraph.edges.filter(e => e.type === 'calls').length;

  const sel = document.getElementById('langFilter');
  Object.keys(fullGraph.stats.languages).forEach(l => {
    const o = document.createElement('option');
    o.value = l;
    o.textContent = l + ' (' + fullGraph.stats.languages[l] + ')';
    sel.appendChild(o);
  });

  computeEntryPoints();
  initGraph3D();
  applyFilter();
  buildHotspotsPanel();
}

// ── 3D graph ──────────────────────────────────────────────────────────────────

function initGraph3D() {
  const container = document.getElementById('graph-container');

  graph3d = ForceGraph3D()(container)
    .backgroundColor('#0C0E14')
    .showNavInfo(false)
    .nodeLabel(n => {
      const label = n.name + (n.filePath !== n.name ? '\n' + n.filePath : '');
      return entryNodeIds.has(n.id) ? '★ entry point\n' + label : label;
    })
    .nodeColor(n => {
      const base = nodeBaseColor(n);
      if (highlightNodes.size === 0) return base;
      return highlightNodes.has(n.id) ? base : '#1A1E2A';
    })
    .nodeVal(n => {
      const base = (NODE_VAL[n.type] || 2) * (entryNodeIds.has(n.id) ? 1.8 : 1);
      return (highlightNodes.size > 0 && highlightNodes.has(n.id)) ? base * 1.6 : base;
    })
    .nodeOpacity(0.92)
    .linkColor(l => {
      if (highlightLinks.size === 0) return LINK_COLOR[l.type] || '#1E2535';
      return highlightLinks.has(l.id) ? (LINK_COLOR[l.type] || '#1E2535') : '#111520';
    })
    .linkWidth(l => {
      if (highlightLinks.size > 0 && highlightLinks.has(l.id)) return 1.5;
      return l.type === 'contains' ? 0.2 : 0.5;
    })
    .linkOpacity(0.7)
    .d3AlphaDecay(0.05)
    .cooldownTicks(200)
    .linkDirectionalArrowLength(l => l.type === 'contains' ? 0 : 4)
    .linkDirectionalArrowRelPos(1)
    .linkDirectionalArrowColor(l => LINK_COLOR[l.type] || '#718096')
    .linkDirectionalParticles(l => l.type === 'calls' ? 3 : 0)
    .linkDirectionalParticleWidth(1.2)
    .linkDirectionalParticleSpeed(0.005)
    .linkDirectionalParticleColor(l => LINK_COLOR[l.type] || '#34D399')
    .onEngineStop(() => {
      setOverlay(false);
      graph3d.zoomToFit(600, 40);
    })
    .onNodeClick(node => {
      if (selectedNodeId === node.id) {
        selectedNodeId = null;
        highlightNodes.clear();
        highlightLinks.clear();
        clearPanel();
        document.getElementById('btnFocus').style.display = 'none';
      } else {
        selectedNodeId = node.id;
        updateHighlight(node);
        showNodeDetail(node);
        document.getElementById('btnFocus').style.display = '';
      }
      refreshColors();
    })
    .onBackgroundClick(() => {
      selectedNodeId = null;
      highlightNodes.clear();
      highlightLinks.clear();
      clearPanel();
      document.getElementById('btnFocus').style.display = 'none';
      refreshColors();
    });
}

function refreshColors() {
  graph3d
    .nodeColor(graph3d.nodeColor())
    .nodeVal(graph3d.nodeVal())
    .linkColor(graph3d.linkColor())
    .linkWidth(graph3d.linkWidth());
}

function updateHighlight(node) {
  highlightNodes.clear();
  highlightLinks.clear();
  highlightNodes.add(node.id);
  graph3d.graphData().links.forEach(link => {
    const src = typeof link.source === 'object' ? link.source.id : link.source;
    const tgt = typeof link.target === 'object' ? link.target.id : link.target;
    if (src === node.id || tgt === node.id) {
      highlightLinks.add(link.id);
      highlightNodes.add(src);
      highlightNodes.add(tgt);
    }
  });
}

// ── focus mode ────────────────────────────────────────────────────────────────

function getNeighborhood(nodeId, hops) {
  const visited = new Set([nodeId]);
  let frontier = [nodeId];
  for (let i = 0; i < hops; i++) {
    const next = [];
    fullGraph.edges.forEach(e => {
      if (e.type === 'contains') return;
      const src = e.source, tgt = e.target;
      if (frontier.includes(src) && !visited.has(tgt)) { visited.add(tgt); next.push(tgt); }
      if (frontier.includes(tgt) && !visited.has(src)) { visited.add(src); next.push(src); }
    });
    frontier = next;
    if (!next.length) break;
  }
  return visited;
}

function enterFocusMode(nodeId) {
  focusNodeId = nodeId;
  const node = fullGraph.nodes.find(n => n.id === nodeId);
  const badge = document.getElementById('focus-badge');
  document.getElementById('focus-badge-name').textContent = node ? node.name : nodeId;
  badge.classList.add('visible');
  document.getElementById('btnFocus').textContent = 'exit focus';
  document.getElementById('btnFocus').style.background = 'rgba(251,191,36,0.1)';
  applyFilter();
}

function exitFocusMode() {
  focusNodeId = null;
  document.getElementById('focus-badge').classList.remove('visible');
  document.getElementById('btnFocus').textContent = 'focus [F]';
  document.getElementById('btnFocus').style.background = '';
  applyFilter();
}

function toggleFocusMode() {
  if (focusNodeId) { exitFocusMode(); return; }
  if (selectedNodeId) enterFocusMode(selectedNodeId);
}

// ── filter ────────────────────────────────────────────────────────────────────

function getFilteredData() {
  const { keyword, lang } = filterState;
  const neighborhood = focusNodeId ? getNeighborhood(focusNodeId, 2) : null;

  const visibleNodes = fullGraph.nodes.slice(0, 1000).filter(n => {
    if (neighborhood && !neighborhood.has(n.id)) return false;
    if (lang !== 'all' && n.language !== lang) return false;
    if (keyword && !n.name.toLowerCase().includes(keyword) && !n.filePath.toLowerCase().includes(keyword)) return false;
    return true;
  });
  const nodeIds = new Set(visibleNodes.map(n => n.id));
  const links = fullGraph.edges.filter(e => e.type !== 'contains').slice(0, 2000).filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
  return {
    nodes: visibleNodes.map(n => Object.assign({}, n)),
    links: links.map(e => Object.assign({}, e)),
  };
}

function applyFilter() {
  filterState = {
    keyword: document.getElementById('search').value.toLowerCase(),
    lang: document.getElementById('langFilter').value,
  };
  selectedNodeId = null;
  highlightNodes.clear();
  highlightLinks.clear();
  if (currentTab === 'details') clearPanel();
  document.getElementById('btnFocus').style.display = 'none';
  setOverlay(true, focusNodeId ? 'Focusing…' : 'Simulating…');
  if (graph3d) graph3d.graphData(getFilteredData());
}

function resetCamera() { if (graph3d) graph3d.zoomToFit(400, 40); }
function rerunLayout()  { if (graph3d) { setOverlay(true, 'Reheating…'); graph3d.d3ReheatSimulation(); } }

// ── panel tabs ────────────────────────────────────────────────────────────────

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-details').classList.toggle('active', tab === 'details');
  document.getElementById('tab-hotspots').classList.toggle('active', tab === 'hotspots');
  document.getElementById('panel-body').style.display = tab === 'details' ? '' : 'none';
  document.getElementById('panel-hotspots').style.display = tab === 'hotspots' ? '' : 'none';
}

// ── hotspots panel ────────────────────────────────────────────────────────────

function buildHotspotsPanel() {
  const container = document.getElementById('panel-hotspots');
  container.textContent = '';
  container.style.cssText = 'flex:1;overflow-y:auto;padding:16px;';
  container.style.setProperty('scrollbar-width', 'thin');

  const importCount = new Map();
  const callCount = new Map();
  fullGraph.edges.forEach(e => {
    if (e.type === 'imports') importCount.set(e.target, (importCount.get(e.target) || 0) + 1);
    if (e.type === 'calls')   callCount.set(e.target,   (callCount.get(e.target)   || 0) + 1);
  });

  const nodeById = new Map(fullGraph.nodes.map(n => [n.id, n]));

  const topImported = [...importCount.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([id, count]) => ({ node: nodeById.get(id), count }))
    .filter(x => x.node);

  const topCalled = [...callCount.entries()]
    .sort((a, b) => b[1] - a[1])
    .slice(0, 10)
    .map(([id, count]) => ({ node: nodeById.get(id), count }))
    .filter(x => x.node);

  const maxImport = topImported[0]?.count || 1;
  const maxCall   = topCalled[0]?.count || 1;

  function renderSection(label, items, maxCount) {
    container.appendChild(el('div', 'hotspot-section-label', label));
    if (!items.length) {
      const none = el('div', '', '—');
      none.style.cssText = 'color:var(--text-3);font-size:12px;font-family:Fira Code,monospace;margin-bottom:12px';
      container.appendChild(none);
      return;
    }
    items.forEach(({ node, count }, i) => {
      const item = el('div', 'hotspot-item');
      item.appendChild(el('span', 'hotspot-rank', '#' + (i + 1)));
      const info = el('div', 'hotspot-info');
      info.appendChild(el('div', 'hotspot-name', node.name));
      if (node.filePath && node.filePath !== node.name) {
        info.appendChild(el('div', 'hotspot-path', node.filePath));
      }
      item.appendChild(info);
      const countEl = el('span', 'hotspot-count', count);
      item.appendChild(countEl);
      item.addEventListener('click', () => {
        switchTab('details');
        const n = fullGraph.nodes.find(x => x.id === node.id);
        if (n) { selectedNodeId = n.id; showNodeDetail(n); updateHighlight(n); refreshColors(); }
      });
      container.appendChild(item);
    });
  }

  renderSection('Most Imported Files', topImported, maxImport);
  container.appendChild(el('div', 'hotspot-divider'));
  renderSection('Most Called Functions', topCalled, maxCall);
}

// ── panel (DOM-only, no innerHTML with data) ──────────────────────────────────

function prow(label, valueNode) {
  const r = el('div', 'prow');
  r.appendChild(el('div', 'prow-label', label));
  const v = el('div', 'prow-val');
  if (typeof valueNode === 'string') {
    v.textContent = valueNode;
  } else {
    v.appendChild(valueNode);
  }
  r.appendChild(v);
  return r;
}

function badge(type) {
  return el('span', 'badge badge-' + type, type);
}

function edgeListEl(edges, dir, nodeById) {
  if (!edges.length) {
    const none = el('div', 'prow-val');
    none.textContent = '—';
    none.style.cssText = 'color:var(--text-3);font-size:12px';
    return none;
  }
  const wrap = el('div', 'edge-list');
  edges.slice(0, 12).forEach(e => {
    const otherId = dir === 'out' ? e.target : e.source;
    const other = nodeById.get(otherId);
    const name = other ? other.name : (otherId.split('::')[1] || otherId);
    const item = el('div', 'edge-item');
    item.appendChild(el('span', 'edge-tag edge-tag-' + e.type, e.type));
    const nameWrap = el('span', 'edge-name');
    nameWrap.appendChild(el('span', 'edge-name-sym', name));
    if (other && other.filePath && other.filePath !== other.name) {
      nameWrap.appendChild(el('span', 'edge-name-path', other.filePath));
    }
    item.appendChild(nameWrap);
    item.style.cursor = 'pointer';
    item.addEventListener('click', () => {
      if (!other) return;
      selectedNodeId = other.id;
      showNodeDetail(other);
      updateHighlight(other);
      refreshColors();
      document.getElementById('btnFocus').style.display = '';
    });
    wrap.appendChild(item);
  });
  return wrap;
}

function showNodeDetail(node) {
  switchTab('details');
  const outEdges = fullGraph.edges.filter(e => e.source === node.id && e.type !== 'contains');
  const inEdges  = fullGraph.edges.filter(e => e.target === node.id && e.type !== 'contains');
  const nodeById = new Map(fullGraph.nodes.map(n => [n.id, n]));

  const body = document.getElementById('panel-body');
  body.textContent = '';

  body.appendChild(prow('type', badge(node.type)));

  if (entryNodeIds.has(node.id)) {
    const entryBadge = el('div', '');
    entryBadge.style.cssText = 'display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:5px;font-size:10px;font-weight:700;font-family:Fira Code,monospace;background:rgba(251,191,36,0.12);color:#FBBF24;border:1px solid rgba(251,191,36,0.3);margin-bottom:14px';
    entryBadge.textContent = '★ entry point';
    body.appendChild(entryBadge);
  }

  const nameVal = el('div', 'prow-val');
  nameVal.style.cssText = 'color:var(--text);font-size:15px;font-weight:700;font-family:Fira Code,monospace;word-break:break-all';
  nameVal.textContent = node.name;
  const nameRow = el('div', 'prow');
  nameRow.appendChild(el('div', 'prow-label', 'name'));
  nameRow.appendChild(nameVal);
  body.appendChild(nameRow);

  const fileVal = el('div', 'prow-val');
  fileVal.style.cssText = 'font-size:11px;color:var(--text-3);word-break:break-all';
  fileVal.textContent = node.filePath;
  const fileRow = el('div', 'prow');
  fileRow.appendChild(el('div', 'prow-label', 'file'));
  fileRow.appendChild(fileVal);
  body.appendChild(fileRow);

  body.appendChild(prow('lines', node.startLine + ' – ' + node.endLine));
  body.appendChild(prow('language', node.language));

  body.appendChild(el('div', 'pdivider'));

  body.appendChild(el('div', 'edge-section-label', 'outgoing (' + outEdges.length + ')'));
  body.appendChild(edgeListEl(outEdges, 'out', nodeById));

  body.appendChild(el('div', 'edge-section-label', 'incoming (' + inEdges.length + ')'));
  body.appendChild(edgeListEl(inEdges, 'in', nodeById));
}

function setOverlay(show, msg) {
  const ov = document.getElementById('overlay');
  if (msg) document.getElementById('overlayMsg').textContent = msg;
  ov.classList.toggle('hidden', !show);
}

// ── keyboard shortcuts ────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'f' || e.key === 'F') {
    if (selectedNodeId) toggleFocusMode();
  }
  if (e.key === 'Escape') {
    if (focusNodeId) exitFocusMode();
  }
});

document.getElementById('search').addEventListener('keydown', e => {
  if (e.key === 'Enter') applyFilter();
});

clearPanel();
loadGraph().catch(err => setOverlay(true, 'Error: ' + err.message));
</script>
